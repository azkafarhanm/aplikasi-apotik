<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - ApotikKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-capsule me-2"></i>ApotikKu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i
                                class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="obat.html"><i
                                class="bi bi-capsule-pill me-1"></i>Data Obat</a></li>
                    <li class="nav-item"><a class="nav-link active" href="transaksi.html"><i
                                class="bi bi-cart3 me-1"></i>Transaksi</a></li>
                    <li class="nav-item"><a class="nav-link" href="laporan.html"><i
                                class="bi bi-file-earmark-bar-graph me-1"></i>Laporan</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i
                                class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="main-content">
        <div class="container">
            <h2 class="page-title"><i class="bi bi-cart3 me-2"></i>Transaksi Penjualan</h2>
            <div class="row">
                <div class="col-lg-8">
                    <div class="card mb-4">
                        <div class="card-header"><i class="bi bi-cart-plus me-2"></i>Transaksi Baru</div>
                        <div class="card-body">
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="pilihObat" class="form-label">Pilih Obat</label>
                                    <select class="form-select" id="pilihObat">
                                        <option value="">-- Pilih Obat --</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="jumlahObat" class="form-label">Jumlah</label>
                                    <input type="number" class="form-control" id="jumlahObat" min="1" value="1">
                                </div>
                                <div class="col-md-3 d-flex align-items-end">
                                    <button class="btn btn-success w-100" id="btnTambahItem"><i
                                            class="bi bi-plus-circle me-2"></i>Tambah</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover" id="tabelKeranjang">
                                    <thead>
                                        <tr>
                                            <th>No</th>
                                            <th>Nama Obat</th>
                                            <th>Harga</th>
                                            <th>Jumlah</th>
                                            <th>Subtotal</th>
                                            <th>Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td colspan="6" class="text-center text-muted">Keranjang kosong</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-wallet2 me-2"></i>Pembayaran</div>
                        <div class="card-body">
                            <div class="mb-3"><label class="form-label">Total Item</label>
                                <h4 class="text-primary mb-0" id="totalItem">0 item</h4>
                            </div>
                            <hr>
                            <div class="mb-3"><label class="form-label">Total Harga</label>
                                <h3 class="text-success mb-0" id="totalHarga">Rp 0</h3>
                            </div>
                            <hr>
                            <div class="mb-3"><label for="bayar" class="form-label">Bayar</label>
                                <div class="input-group"><span class="input-group-text">Rp</span><input type="number"
                                        class="form-control" id="bayar"></div>
                            </div>
                            <div class="mb-4"><label class="form-label">Kembalian</label>
                                <h4 class="text-info mb-0" id="kembalian">Rp 0</h4>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg" id="btnProses"><i
                                        class="bi bi-check-circle me-2"></i>Proses</button>
                                <button class="btn btn-outline-danger" id="btnReset"><i
                                        class="bi bi-x-circle me-2"></i>Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 ApotikKu</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>initData();</script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/obat.js"></script>
    <script src="assets/js/transaksi.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - ApotikKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-capsule me-2"></i>ApotikKu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i
                                class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="obat.html"><i
                                class="bi bi-capsule-pill me-1"></i>Data Obat</a></li>
                    <li class="nav-item"><a class="nav-link active" href="transaksi.html"><i
                                class="bi bi-cart3 me-1"></i>Transaksi</a></li>
                    <li class="nav-item"><a class="nav-link" href="laporan.html"><i
                                class="bi bi-file-earmark-bar-graph me-1"></i>Laporan</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i
                                class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="main-content">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0"><i class="bi bi-clock-history me-2"></i>Riwayat Transaksi</h2>
                <a class="btn btn-primary" href="obat.html">
                    <i class="bi bi-cart-plus me-2"></i>Beli Obat
                </a>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h6 class="card-title">Total Transaksi</h6>
                            <h3 class="mb-0" id="transaksiCount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h6 class="card-title">Total Pendapatan</h6>
                            <h3 class="mb-0" id="transaksiRevenue">Rp 0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-warning h-100">
                        <div class="card-body">
                            <h6 class="card-title">Item Terjual</h6>
                            <h3 class="mb-0" id="transaksiItems">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-table me-2"></i>Daftar Transaksi</span>
                    <button class="btn btn-outline-primary btn-sm" id="btnRefreshTransaksi">
                        <i class="bi bi-arrow-clockwise me-2"></i>Refresh
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Tanggal</th>
                                    <th>Kode Transaksi</th>
                                    <th>Nama Obat</th>
                                    <th>Jumlah</th>
                                    <th>Harga</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="transaksiTableBody">
                                <tr>
                                    <td colspan="7" class="text-center text-muted">Belum ada histori transaksi</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 ApotikKu</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>initData();</script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/obat.js"></script>
    <script src="assets/js/transaksi.js"></script>
</body>

</html>

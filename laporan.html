<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - ApotikKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-capsule me-2"></i>ApotikKu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i
                                class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="obat.html"><i
                                class="bi bi-capsule-pill me-1"></i>Data Obat</a></li>
                    <li class="nav-item"><a class="nav-link" href="transaksi.html"><i
                                class="bi bi-cart3 me-1"></i>Transaksi</a></li>
                    <li class="nav-item"><a class="nav-link active" href="laporan.html"><i
                                class="bi bi-file-earmark-bar-graph me-1"></i>Laporan</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i
                                class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="main-content">
        <div class="container">
            <h2 class="page-title"><i class="bi bi-file-earmark-bar-graph me-2"></i>Laporan</h2>
            <div class="card mb-4">
                <div class="card-header"><i class="bi bi-funnel me-2"></i>Filter Laporan</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="jenisLaporan" class="form-label">Jenis Laporan</label>
                            <select class="form-select" id="jenisLaporan">
                                <option value="harian">Harian</option>
                                <option value="bulanan">Bulanan</option>
                                <option value="stok">Stok Obat</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="tanggalMulai" class="form-label">Tanggal Mulai</label>
                            <input type="date" class="form-control" id="tanggalMulai">
                        </div>
                        <div class="col-md-3">
                            <label for="tanggalAkhir" class="form-label">Tanggal Akhir</label>
                            <input type="date" class="form-control" id="tanggalAkhir">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button class="btn btn-primary w-100" id="btnGenerateLaporan"><i
                                    class="bi bi-search me-2"></i>Generate</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card stats-card h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted">Total Transaksi</h6>
                            <h2 class="text-primary" id="totalTransaksi">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stats-card success h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted">Total Pendapatan</h6>
                            <h2 class="text-success" id="totalPendapatan">Rp 0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stats-card warning h-100">
                        <div class="card-body text-center">
                            <h6 class="text-muted">Item Terjual</h6>
                            <h2 class="text-warning" id="itemTerjual">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-table me-2"></i>Detail Laporan</span>
                    <button class="btn btn-success btn-sm" id="btnExport"><i
                            class="bi bi-download me-2"></i>Export</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="tabelLaporan">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Tanggal</th>
                                    <th>Kode Transaksi</th>
                                    <th>Nama Obat</th>
                                    <th>Jumlah</th>
                                    <th>Harga</th>
                                    <th>Total Harga</th>
                                </tr>
                            </thead>
                            <tbody id="laporanTableBody">
                                <tr>
                                    <td colspan="7" class="text-center text-muted">Silakan generate laporan terlebih
                                        dahulu</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 ApotikKu</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>initData();</script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/transaksi.js"></script>
    <script src="assets/js/laporan.js"></script>
</body>

</html>

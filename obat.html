    <script src="assets/js/obat.js"></script>

    <script>
        // Flag untuk menandai apakah sedang mode edit
        let currentEditId = null;

        // Fungsi untuk mengisi form dan membuka modal dalam mode edit
        function editObat(id) {
            const obat = Obat.getById(id);
            if (!obat) return;

            currentEditId = id;

            document.getElementById("namaObat").value = obat.nama;
            document.getElementById("kategoriObat").value = (obat.kategori || "").toLowerCase();
            document.getElementById("hargaObat").value = obat.harga;
            document.getElementById("stokObat").value = obat.stok;

            // Ubah judul modal dan tombol
            document.querySelector("#modalTambahObat .modal-title").innerHTML =
                '<i class="bi bi-pencil-square me-2"></i>Edit Obat';
            document.getElementById("btnSimpanObat").innerHTML =
                '<i class="bi bi-save me-2"></i>Update';

            const modal = new bootstrap.Modal(document.getElementById("modalTambahObat"));
            modal.show();
        }

        // 1. STATE & FUNCTION HARUS DI GLOBAL SCOPE
        let currentSort = { column: null, direction: 'asc' };

        function handleSort(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }

            // Update UI for active column
            document.querySelectorAll('th[onclick^="handleSort"] i').forEach(icon => {
                icon.className = 'bi bi-chevron-expand';
            });
            const activeIcon = document.getElementById('sortIcon-' + column);
            if (activeIcon) {
                activeIcon.className = currentSort.direction === 'asc' ? 'bi bi-chevron-up' : 'bi bi-chevron-down';
            }

            applyFilters();
        }

        // --- PAGINATION STATE ---
        let currentPage = 1;
        const rowsPerPage = 5;

        function changePage(direction) {
            currentPage += direction;
            applyFilters();
        }

        // === SEARCH & FILTER: Filter tabel secara real-time ===
        function applyFilters() {
            const searchInput = document.getElementById("searchObat");
            const filterKategoriInput = document.getElementById("filterKategori");
            const filterStokInput = document.getElementById("filterStok");

            // Safeguard if elements aren't ready yet
            if (!searchInput || !filterKategoriInput || !filterStokInput) return;

            const search = searchInput.value.trim().toLowerCase();
            const kategori = filterKategoriInput.value;
            const stokStatus = filterStokInput.value;

            // Ambil semua data asli
            let allData = Obat.getAllObat();

            // Terapkan filter gabungan
            const filtered = allData.filter(obat => {
                // Filter Nama
                const matchSearch = !search || obat.nama.toLowerCase().includes(search);

                // Filter Kategori
                const matchKategori = !kategori || (obat.kategori || "").toLowerCase() === kategori;

                // Filter Stok
                let matchStok = true;
                if (stokStatus === "tersedia") {
                    matchStok = obat.stok > 10;
                } else if (stokStatus === "menipis") {
                    matchStok = obat.stok > 0 && obat.stok <= 10;
                } else if (stokStatus === "habis") {
                    matchStok = obat.stok === 0;
                }

                return matchSearch && matchKategori && matchStok;
            });

            // 2. SISIPKAN LOGIKA SORTING SEBELUM RENDER
            if (currentSort.column) {
                filtered.sort((a, b) => {
                    let valA = a[currentSort.column];
                    let valB = b[currentSort.column];

                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();

                    if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }
            
            // 3. PAGINATION LOGIC
            const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * rowsPerPage;
            const paginatedData = filtered.slice(startIndex, startIndex + rowsPerPage);

            document.getElementById("pageInfo").textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById("prevPage").disabled = currentPage === 1;
            document.getElementById("nextPage").disabled = currentPage === totalPages;

            // Render tabel dengan data yang sudah difilter dan dipaginate
            Obat.renderTableFromData(paginatedData);
        }

        // Inisialisasi data obat saat halaman dimuat
        document.addEventListener("DOMContentLoaded", function () {
            const existingObat = Obat.getAllObat();
            const isLegacySeed =
                existingObat.length === 3 &&
                existingObat.some(obat => obat.nama === "Paracetamol") &&
                existingObat.some(obat => obat.nama === "Amoxicillin") &&
                existingObat.some(obat => obat.nama === "Vitamin C");

            if ((existingObat.length === 0 || isLegacySeed) && Array.isArray(window.sampleObat) && window.sampleObat.length > 0) {
                localStorage.setItem("apotikku_obat", JSON.stringify([]));

                window.sampleObat.forEach(function (item) {
                    Obat.addObat({
                        ...item,
                        kategori: item.kategori.toLowerCase()
                    });
                });

                console.log("sampleObat inserted into localStorage:", window.sampleObat.length, "items");
            } else {
                console.log("sampleObat not inserted. Existing data:", existingObat.length);
            }

            // Override renderTable agar menggunakan pagination
            Obat.renderTable = function() { applyFilters(); };
            
            Obat.renderTable();

            // Event listener untuk input pencarian dan dropdown filter
            document.getElementById("searchObat").addEventListener("input", () => { currentPage = 1; applyFilters(); });
            document.getElementById("filterKategori").addEventListener("change", () => { currentPage = 1; applyFilters(); });
            document.getElementById("filterStok").addEventListener("change", () => { currentPage = 1; applyFilters(); });

            // Reset modal ke mode tambah saat ditutup
            document.getElementById("modalTambahObat").addEventListener("hidden.bs.modal", function () {
                currentEditId = null;
                document.getElementById("formTambahObat").reset();
                document.querySelector("#modalTambahObat .modal-title").innerHTML =
                    '<i class="bi bi-plus-circle me-2"></i>Tambah Obat Baru';
                document.getElementById("btnSimpanObat").innerHTML =
                    '<i class="bi bi-save me-2"></i>Simpan';
            });

            // Form handler untuk Simpan / Update Obat
            const btnSimpanObat = document.getElementById("btnSimpanObat");
            btnSimpanObat.addEventListener("click", function () {
                const namaObat = document.getElementById("namaObat").value.trim();
                const kategoriObat = document.getElementById("kategoriObat").value.trim();
                const hargaObat = document.getElementById("hargaObat").value.trim();
                const stokObat = document.getElementById("stokObat").value.trim();

                // Validasi semua field harus diisi
                if (!namaObat || !kategoriObat || !hargaObat || !stokObat) {
                    alert("Semua field harus diisi!");
                    return;
                }

                const data = {
                    nama: namaObat,
                    kategori: kategoriObat,
                    harga: Number(hargaObat),
                    stok: Number(stokObat)
                };

                // === LOGIKA UTAMA: Edit atau Tambah ===
                if (currentEditId) {
                    // Mode edit → update data yang sudah ada
                    Obat.update(currentEditId, data);
                } else {
                    // Mode tambah → simpan data baru
                    Obat.addObat(data);
                }

                // Refresh tabel
                applyFilters();

                // Reset form & flag
                currentEditId = null;
                document.getElementById("formTambahObat").reset();

                // Tutup modal
                const modal = bootstrap.Modal.getInstance(document.getElementById("modalTambahObat"));
                modal.hide();
            });
        });
    </script>

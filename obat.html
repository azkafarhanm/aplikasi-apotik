<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Data Obat - ApotikKu">
    <title>Data Obat - ApotikKu</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-capsule me-2"></i>ApotikKu
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="obat.html">
                            <i class="bi bi-capsule-pill me-1"></i>Data Obat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="transaksi.html">
                            <i class="bi bi-cart3 me-1"></i>Transaksi
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="laporan.html">
                            <i class="bi bi-file-earmark-bar-graph me-1"></i>Laporan
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0">
                    <i class="bi bi-capsule-pill me-2"></i>Data Obat
                </h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTambahObat">
                    <i class="bi bi-plus-circle me-2"></i>Tambah Obat
                </button>
            </div>

            <!-- Search and Filter -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-search"></i>
                                </span>
                                <input type="text" class="form-control" id="searchObat" placeholder="Cari obat...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterKategori">
                                <option value="">Semua Kategori</option>
                                <option value="tablet">Tablet</option>
                                <option value="kapsul">Kapsul</option>
                                <option value="sirup">Sirup</option>
                                <option value="salep">Salep</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterStok">
                                <option value="">Semua Stok</option>
                                <option value="tersedia">Tersedia</option>
                                <option value="menipis">Menipis</option>
                                <option value="habis">Habis</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabel Obat -->
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-table me-2"></i>Daftar Obat
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="tabelObat">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Kode Obat</th>
                                    <th>Nama Obat</th>
                                    <th>Kategori</th>
                                    <th>Harga</th>
                                    <th>Stok</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center text-muted">
                                        Belum ada data obat
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Obat -->
    <div class="modal fade" id="modalTambahObat" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-plus-circle me-2"></i>Tambah Obat Baru
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formTambahObat">
                        <div class="mb-3">
                            <label for="namaObat" class="form-label">Nama Obat</label>
                            <input type="text" class="form-control" id="namaObat" required>
                        </div>
                        <div class="mb-3">
                            <label for="kategoriObat" class="form-label">Kategori</label>
                            <select class="form-select" id="kategoriObat" required>
                                <option value="">Pilih Kategori</option>
                                <option value="tablet">Tablet</option>
                                <option value="kapsul">Kapsul</option>
                                <option value="sirup">Sirup</option>
                                <option value="salep">Salep</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="hargaObat" class="form-label">Harga</label>
                            <div class="input-group">
                                <span class="input-group-text">Rp</span>
                                <input type="number" class="form-control" id="hargaObat" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="stokObat" class="form-label">Stok</label>
                            <input type="number" class="form-control" id="stokObat" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary" id="btnSimpanObat">
                        <i class="bi bi-save me-2"></i>Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 ApotikKu - Sistem Manajemen Apotek</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/storage.js"></script>
    <script>initData();</script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/obat.js"></script>
</body>

</html>
